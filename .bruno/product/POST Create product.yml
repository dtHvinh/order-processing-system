info:
  name: POST Create product
  type: http
  seq: 4

http:
  method: POST
  url: "{{uo}}products"
  body:
    type: json
    data: |-
      {
        "productId": "{{$guid}}",
        "name": "Sample product",
        "unitPrice": 50
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
