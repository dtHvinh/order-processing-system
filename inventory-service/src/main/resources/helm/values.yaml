replicaCount: 1
image:
  repository: inventory-service
  pullPolicy: Never
  tag: "0.0.0"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}
service:
  type: NodePort
  port: 8181
  nodePort:
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers

resources: {}
livenessProbe:
  httpGet:
    path: /cxf/api/health
    port: http
  initialDelaySeconds: 15
readinessProbe:
  httpGet:
    path: /cxf/api/health
    port: http

postgres:
  environmentVariables:
    POSTGRES_DB: inventory_db
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
volumes: []
volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}
