replicaCount: 1
image:
  repository: order-service
  pullPolicy: Never
  tag: "0.0.0"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}
service:
  type: ClusterIP
  port: 8181

ingress:
  enabled: true
  className: "kong"
  annotations:
    konghq.com/strip-path: "false"
  hosts:
    - host: ""
      paths:
        - path: /api/orders
          pathType: Prefix
  tls: []
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers

resources: {}
livenessProbe:
  httpGet:
    path: /api/orders/health
    port: 8181
  initialDelaySeconds: 15

readinessProbe:
  httpGet:
    path: /api/orders/health
    port: 8181
  initialDelaySeconds: 15

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
volumes: []
volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}
