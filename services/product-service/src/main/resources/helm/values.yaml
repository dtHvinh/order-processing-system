replicaCount: 1
image:
  repository: product-service
  pullPolicy: Never
  tag: "0.0.0"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/internal/prometheus/metrics"
  prometheus.io/port: "8181"
podLabels: {}

podSecurityContext: {}

securityContext: {}
service:
  type: ClusterIP
  port: 8181

ingress:
  enabled: true
  className: "kong"
  annotations:
    konghq.com/strip-path: "false"
  hosts:
    - host: ""
      paths:
        - path: /api/products
          pathType: Prefix
  tls: []
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers

resources: {}
livenessProbe:
  httpGet:
    path: /api/products/health
    port: http
  initialDelaySeconds: 15
readinessProbe:
  httpGet:
    path: /api/products/health
    port: http
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
volumes: []
volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}
